name: zerotouchrescue
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  
  # 🔥 Firebase
  firebase_core: ^3.6.0
  firebase_database: ^11.3.0
  firebase_auth: ^5.3.0
  firebase_messaging: ^15.0.0

  # 🚨 Emergency system
  flutter_foreground_task: ^6.0.0
  flutter_background_service: ^5.0.5
  flutter_background_service_android: ^6.2.2
  rxdart: ^0.27.7


  # 📍 Location & sensors
  google_maps_flutter: ^2.5.0
  geolocator: ^13.0.0
  sensors_plus: ^5.0.1
  flutter_dotenv: ^5.1.0


  # 🎤 Voice + permissions
  speech_to_text: ^7.0.0
  permission_handler: ^11.0.1
  local_auth: ^2.1.6

  # 🌐 Networking
  http: ^1.2.0
  connectivity_plus: ^6.0.5
  url_launcher: ^6.2.5

  # 💾 Local storage
  shared_preferences: ^2.2.3
  encrypt: ^5.0.1

  # 🔔 Notifications
  flutter_local_notifications: ^17.0.0

  cupertino_icons: ^1.0.8
  battery_plus: ^7.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env    